name: Verify framework portfolio

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm run check:matrix
      - run: npm run export:matrix
      - name: Confirm generated exports are committed
        run: git diff --exit-code -- public/data
